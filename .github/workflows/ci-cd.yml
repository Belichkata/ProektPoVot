name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  BACKEND_IMAGE: music-map-backend
  FRONTEND_IMAGE: music-map-frontend

jobs:
  test:
    name: Tests and quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend install
        working-directory: backend
        run: npm ci

      - name: Backend tests
        working-directory: backend
        run: npm test

      - name: Frontend install
        working-directory: frontend
        run: npm install

      - name: Frontend tests
        working-directory: frontend
        run: npm test -- --watchAll=false --runInBand

      - name: Frontend build
        working-directory: frontend
        run: npm run build

  docker:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            REACT_APP_API_URL=${{ vars.REACT_APP_API_URL || 'http://localhost:5000' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        run: |
          if [ -z "$KUBE_CONFIG_B64" ]; then
            echo "KUBE_CONFIG_B64 is not configured. Skipping deploy."
            exit 0
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_B64" | base64 -d > "$HOME/.kube/config"

      - name: Apply manifests
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ github.sha }}
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        run: |
          if [ -z "$KUBE_CONFIG_B64" ]; then
            exit 0
          fi
          cp -R k8s/base /tmp/music-map-k8s
          sed -i "s|DOCKERHUB_USERNAME|$DOCKERHUB_USERNAME|g" /tmp/music-map-k8s/*.yaml
          sed -i "s|IMAGE_TAG|$IMAGE_TAG|g" /tmp/music-map-k8s/*.yaml
          kubectl apply -f /tmp/music-map-k8s
          kubectl rollout status deployment/music-map-backend -n music-map --timeout=120s
          kubectl rollout status deployment/music-map-frontend -n music-map --timeout=120s

  notify:
    name: Webhook notification
    runs-on: ubuntu-latest
    needs:
      - test
      - docker
      - deploy
    if: always()
    steps:
      - name: Send notification
        env:
          WEBHOOK_URL: ${{ secrets.NOTIFICATION_WEBHOOK_URL }}
          RESULT: ${{ needs.test.result }}/${{ needs.docker.result }}/${{ needs.deploy.result }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "NOTIFICATION_WEBHOOK_URL is not configured. Skipping notification."
            exit 0
          fi
          curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"Music Map CI/CD finished: $RESULT for $GITHUB_REPOSITORY@$GITHUB_SHA\"}"

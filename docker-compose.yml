services:
  backend:
    build:
      context: ./backend
    environment:
      PORT: 5000
      NODE_ENV: production
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: http://localhost:5000
    depends_on:
      - backend
    ports:
      - "3000:3000"

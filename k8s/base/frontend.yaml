apiVersion: apps/v1
kind: Deployment
metadata:
  name: music-map-frontend
  namespace: music-map
  labels:
    app.kubernetes.io/name: music-map
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: music-map
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: music-map
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: docker.io/DOCKERHUB_USERNAME/music-map-frontend:IMAGE_TAG
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: music-map-frontend
  namespace: music-map
  labels:
    app.kubernetes.io/name: music-map
    app.kubernetes.io/component: frontend
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: music-map
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 3000
      targetPort: http
